<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Ops — Launch Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<style>
/* ============================================
   CONFLUENCE-LIKE DESIGN SYSTEM
   Based on Atlassian Design System colors
   ============================================ */

/* Reset & Base */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue-900: #091E42;
  --blue-800: #0747A6;
  --blue-700: #0052CC;
  --blue-600: #0065FF;
  --blue-500: #2684FF;
  --blue-100: #DEEBFF;
  --blue-50: #F0F6FF;
  --green-700: #006644;
  --green-500: #00875A;
  --green-100: #E3FCEF;
  --yellow-700: #FF8B00;
  --yellow-500: #FF991F;
  --yellow-100: #FFFAE6;
  --red-700: #BF2600;
  --red-500: #DE350B;
  --red-100: #FFEBE6;
  --purple-500: #6554C0;
  --purple-100: #EAE6FF;
  --teal-500: #00B8D9;
  --teal-100: #E6FCFF;
  --neutral-900: #091E42;
  --neutral-800: #172B4D;
  --neutral-700: #253858;
  --neutral-500: #42526E;
  --neutral-400: #505F79;
  --neutral-300: #5E6C84;
  --neutral-200: #6B778C;
  --neutral-100: #7A869A;
  --neutral-80: #97A0AF;
  --neutral-60: #B3BAC5;
  --neutral-40: #DFE1E6;
  --neutral-30: #EBECF0;
  --neutral-20: #F4F5F7;
  --neutral-10: #FAFBFC;
  --white: #FFFFFF;
  --header-height: 48px;
  --sidebar-width: 280px;
}

html { font-size: 14px; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
  color: var(--neutral-800);
  background: var(--neutral-20);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ============================================
   LAYOUT
   ============================================ */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ============================================
   HEADER
   ============================================ */
.header {
  height: var(--header-height);
  background: var(--blue-800);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-logo {
  display: flex;
  align-items: center;
  cursor: pointer;
}

.header-nav {
  display: flex;
  gap: 4px;
}

.header-nav-item {
  color: rgba(255, 255, 255, 0.7);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}

.header-nav-item:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
.header-nav-item.active { color: #fff; background: rgba(255, 255, 255, 0.2); }

.header-center { flex: 1; display: flex; justify-content: center; max-width: 500px; margin: 0 auto; }

.header-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 6px;
  padding: 5px 12px;
  color: rgba(255, 255, 255, 0.6);
  font-size: 13px;
  width: 100%;
  cursor: text;
  transition: background 0.15s;
}

.header-search:hover { background: rgba(255, 255, 255, 0.25); }

.header-right { display: flex; align-items: center; gap: 8px; }

.header-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--teal-500);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
}

/* ============================================
   SIDEBAR
   ============================================ */
.sidebar {
  width: var(--sidebar-width);
  background: var(--neutral-10);
  border-right: 1px solid var(--neutral-40);
  overflow-y: auto;
  flex-shrink: 0;
}

.sidebar-space-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--neutral-40);
}

.sidebar-space-icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  background: var(--blue-100);
  border-radius: 4px;
}

.sidebar-space-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--neutral-800);
}

.sidebar-space-key {
  font-size: 11px;
  color: var(--neutral-200);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sidebar-nav { padding: 8px 0; }

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  font-size: 13px;
  color: var(--neutral-500);
  cursor: default;
  border-radius: 0;
  transition: background 0.1s;
  min-height: 30px;
  user-select: none;
}

.sidebar-item.clickable { cursor: pointer; }
.sidebar-item.clickable:hover { background: var(--neutral-30); }
.sidebar-item.active {
  background: var(--blue-100);
  color: var(--blue-700);
  font-weight: 500;
}

.sidebar-chevron {
  width: 16px;
  height: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--neutral-200);
  transition: transform 0.15s;
  flex-shrink: 0;
  cursor: pointer;
}

.sidebar-chevron.expanded { transform: rotate(90deg); }

.sidebar-chevron-spacer { width: 16px; flex-shrink: 0; }

.sidebar-icon { font-size: 14px; flex-shrink: 0; }

.sidebar-label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ============================================
   CONTENT AREA
   ============================================ */
.content {
  flex: 1;
  overflow-y: auto;
  background: var(--white);
}

.content-header {
  padding: 12px 40px 0;
  border-bottom: 1px solid var(--neutral-30);
  background: var(--white);
  position: sticky;
  top: 0;
  z-index: 10;
}

.breadcrumbs {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  padding-bottom: 12px;
  flex-wrap: wrap;
}

.breadcrumb-item {
  color: var(--blue-700);
  cursor: pointer;
}

.breadcrumb-item:hover { text-decoration: underline; }
.breadcrumb-sep { color: var(--neutral-200); }
.breadcrumb-current { color: var(--neutral-500); }

.page-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 40px 60px;
}

/* ============================================
   PAGE CONTENT TYPOGRAPHY
   ============================================ */
.page-title {
  font-size: 28px;
  font-weight: 500;
  color: var(--neutral-800);
  margin-bottom: 8px;
  line-height: 1.2;
}

.page-content h1 {
  font-size: 24px;
  font-weight: 500;
  color: var(--neutral-800);
  margin: 32px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--neutral-30);
}

.page-content h2 {
  font-size: 20px;
  font-weight: 500;
  color: var(--neutral-800);
  margin: 28px 0 10px;
}

.page-content h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--neutral-700);
  margin: 20px 0 8px;
}

.page-content p {
  margin: 10px 0;
  color: var(--neutral-800);
  line-height: 1.7;
}

.page-content ul, .page-content ol {
  margin: 8px 0;
  padding-left: 24px;
}

.page-content li {
  margin: 4px 0;
  line-height: 1.6;
}

.page-content strong { font-weight: 600; }

.page-content a, .mention {
  color: var(--blue-700);
  text-decoration: none;
  cursor: pointer;
}

.page-content a:hover, .mention:hover { text-decoration: underline; }

.page-content hr {
  border: none;
  border-top: 1px solid var(--neutral-30);
  margin: 24px 0;
}

/* ============================================
   CONFLUENCE COMPONENTS
   ============================================ */

/* Info Panels */
.panel {
  border-radius: 3px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 3px solid;
}

.panel-info { background: var(--blue-50); border-color: var(--blue-500); }
.panel-success { background: var(--green-100); border-color: var(--green-500); }
.panel-warning { background: var(--yellow-100); border-color: var(--yellow-500); }
.panel-error { background: var(--red-100); border-color: var(--red-500); }
.panel-note { background: var(--purple-100); border-color: var(--purple-500); }

.panel-title {
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 6px;
}

.panel-info .panel-title { color: var(--blue-800); }
.panel-success .panel-title { color: var(--green-700); }
.panel-warning .panel-title { color: var(--yellow-700); }
.panel-error .panel-title { color: var(--red-700); }
.panel-note .panel-title { color: var(--purple-500); }

/* Status Lozenges */
.lozenge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.lozenge-success { background: var(--green-100); color: var(--green-700); }
.lozenge-moved { background: var(--yellow-100); color: var(--yellow-700); }
.lozenge-info { background: var(--blue-100); color: var(--blue-800); }
.lozenge-default { background: var(--neutral-30); color: var(--neutral-500); }
.lozenge-error { background: var(--red-100); color: var(--red-700); }
.lozenge-new { background: var(--purple-100); color: var(--purple-500); }

.lozenge-bold-success { background: var(--green-500); color: #fff; }
.lozenge-bold-info { background: var(--blue-700); color: #fff; }
.lozenge-bold-warning { background: var(--yellow-500); color: var(--neutral-900); }
.lozenge-bold-error { background: var(--red-500); color: #fff; }

/* Tables */
.confluence-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 13px;
}

.confluence-table th {
  background: var(--neutral-20);
  font-weight: 600;
  text-align: left;
  padding: 8px 12px;
  border: 1px solid var(--neutral-40);
  color: var(--neutral-700);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.confluence-table td {
  padding: 8px 12px;
  border: 1px solid var(--neutral-40);
  vertical-align: top;
}

.confluence-table tr:hover td { background: var(--neutral-10); }

/* Labels */
.label {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
  background: var(--neutral-30);
  color: var(--neutral-500);
  margin: 2px 4px 2px 0;
}

.page-labels {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

/* Page Metadata */
.page-metadata {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--neutral-30);
  font-size: 12px;
  color: var(--neutral-300);
}

.page-meta-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.meta-avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--blue-500);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 700;
  flex-shrink: 0;
}

/* Avatars */
.avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.avatar-blue { background: var(--blue-500); }
.avatar-teal { background: var(--teal-500); }
.avatar-green { background: var(--green-500); }
.avatar-purple { background: var(--purple-500); }
.avatar-red { background: var(--red-500); }
.avatar-yellow { background: var(--yellow-500); }

/* Stage Tracker */
.stage-tracker {
  display: flex;
  gap: 0;
  margin: 20px 0;
  overflow: hidden;
  border-radius: 8px;
}

.stage-item {
  flex: 1;
  padding: 12px 16px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  position: relative;
  background: var(--neutral-30);
  color: var(--neutral-300);
  border-right: 2px solid var(--white);
}

.stage-item.completed {
  background: var(--green-500);
  color: #fff;
}

.stage-item.current {
  background: var(--blue-700);
  color: #fff;
}

.stage-item.upcoming {
  background: var(--neutral-30);
  color: var(--neutral-300);
}

.stage-item-label { display: block; font-size: 11px; font-weight: 400; margin-top: 2px; opacity: 0.8; }

/* Dashboard Cards */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 20px 0;
}

.dashboard-card {
  border: 1px solid var(--neutral-40);
  border-radius: 8px;
  padding: 16px;
  background: var(--white);
}

.dashboard-card-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--neutral-300);
  margin-bottom: 12px;
}

.dashboard-card-full {
  grid-column: 1 / -1;
}

/* Stat Cards */
.stat-row {
  display: flex;
  gap: 16px;
  margin: 20px 0;
}

.stat-card {
  flex: 1;
  background: var(--neutral-10);
  border: 1px solid var(--neutral-40);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--blue-700);
}

.stat-label {
  font-size: 12px;
  color: var(--neutral-300);
  margin-top: 4px;
}

/* Checklist */
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--neutral-30);
}

.checklist-check {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 2px;
}

.checklist-check.done {
  background: var(--green-500);
  color: #fff;
}

.checklist-check.pending {
  background: var(--white);
  border: 2px solid var(--neutral-40);
}

.checklist-check.blocked {
  background: var(--yellow-100);
  border: 2px solid var(--yellow-500);
  color: var(--yellow-700);
}

.checklist-content { flex: 1; }

.checklist-title {
  font-weight: 500;
  font-size: 14px;
}

.checklist-detail {
  font-size: 12px;
  color: var(--neutral-300);
  margin-top: 2px;
}

/* Timeline */
.timeline { margin: 16px 0; }

.timeline-item {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  position: relative;
}

.timeline-item:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 11px;
  top: 36px;
  bottom: 0;
  width: 2px;
  background: var(--neutral-40);
}

.timeline-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  z-index: 1;
}

.timeline-dot.done { background: var(--green-500); color: #fff; }
.timeline-dot.current { background: var(--blue-700); color: #fff; }
.timeline-dot.upcoming { background: var(--neutral-30); color: var(--neutral-300); }

.timeline-content { flex: 1; }

.timeline-date {
  font-size: 11px;
  color: var(--neutral-300);
  font-weight: 500;
}

.timeline-title {
  font-weight: 500;
  color: var(--neutral-800);
  margin-top: 2px;
}

.timeline-detail {
  font-size: 12px;
  color: var(--neutral-400);
  margin-top: 2px;
}

/* Expand/Collapse */
.expand-section {
  border: 1px solid var(--neutral-40);
  border-radius: 4px;
  margin: 12px 0;
}

.expand-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--neutral-10);
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  user-select: none;
}

.expand-header:hover { background: var(--neutral-20); }

.expand-body {
  padding: 14px;
  border-top: 1px solid var(--neutral-40);
}

/* Activity Feed */
.activity-item {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  font-size: 13px;
}

.activity-item + .activity-item { border-top: 1px solid var(--neutral-30); }

.activity-text { flex: 1; }
.activity-time { color: var(--neutral-200); font-size: 12px; white-space: nowrap; }

/* Wireframe Mockups */
.mockup-container {
  border: 1px solid var(--neutral-40);
  border-radius: 8px;
  overflow: hidden;
  margin: 16px 0;
}

.mockup-toolbar {
  background: var(--neutral-20);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--neutral-40);
}

.mockup-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--neutral-60);
}

.mockup-dot:nth-child(1) { background: #ff5f57; }
.mockup-dot:nth-child(2) { background: #ffbd2e; }
.mockup-dot:nth-child(3) { background: #28ca42; }

.mockup-body {
  padding: 20px;
  background: var(--neutral-10);
  min-height: 200px;
}

.mockup-label {
  text-align: center;
  color: var(--neutral-300);
  font-size: 12px;
  font-style: italic;
  padding: 8px;
}

/* Inline Link */
.page-link {
  color: var(--blue-700);
  cursor: pointer;
  text-decoration: none;
  font-weight: 500;
}

.page-link:hover { text-decoration: underline; }

/* Signoff Row */
.signoff-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--neutral-30);
}

.signoff-name {
  flex: 1;
  font-weight: 500;
}

.signoff-role {
  width: 120px;
  font-size: 12px;
  color: var(--neutral-300);
}

.signoff-date {
  font-size: 12px;
  color: var(--neutral-300);
  width: 100px;
}

/* DCR Cards */
.dcr-card {
  border: 2px solid var(--yellow-500);
  background: var(--yellow-100);
  border-radius: 8px;
  padding: 20px;
  margin: 16px 0;
}

.dcr-card-title {
  font-weight: 700;
  font-size: 16px;
  color: var(--yellow-700);
  margin-bottom: 12px;
}

.dcr-field {
  display: flex;
  gap: 8px;
  margin: 6px 0;
  font-size: 13px;
}

.dcr-field-label {
  font-weight: 600;
  color: var(--neutral-700);
  width: 160px;
  flex-shrink: 0;
}

/* Section Header */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 28px 0 12px;
}

/* Scrollbar styling */
.sidebar::-webkit-scrollbar,
.content::-webkit-scrollbar {
  width: 8px;
}

.sidebar::-webkit-scrollbar-track,
.content::-webkit-scrollbar-track {
  background: transparent;
}

.sidebar::-webkit-scrollbar-thumb,
.content::-webkit-scrollbar-thumb {
  background: var(--neutral-60);
  border-radius: 4px;
}

.sidebar::-webkit-scrollbar-thumb:hover,
.content::-webkit-scrollbar-thumb:hover {
  background: var(--neutral-80);
}

/* Properties Panel (like Confluence Page Properties) */
.properties-panel {
  background: var(--neutral-10);
  border: 1px solid var(--neutral-40);
  border-radius: 4px;
  padding: 0;
  margin: 16px 0;
  overflow: hidden;
}

.properties-row {
  display: flex;
  border-bottom: 1px solid var(--neutral-40);
}

.properties-row:last-child { border-bottom: none; }

.properties-key {
  width: 180px;
  padding: 8px 14px;
  font-weight: 600;
  font-size: 12px;
  color: var(--neutral-500);
  background: var(--neutral-20);
  border-right: 1px solid var(--neutral-40);
  flex-shrink: 0;
}

.properties-value {
  flex: 1;
  padding: 8px 14px;
  font-size: 13px;
}

/* Action Items */
.action-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 0;
}

.action-checkbox {
  width: 16px;
  height: 16px;
  border: 2px solid var(--blue-500);
  border-radius: 3px;
  margin-top: 2px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #fff;
}

.action-checkbox.checked {
  background: var(--blue-500);
}

/* Blockquote */
.page-content blockquote {
  border-left: 3px solid var(--neutral-60);
  padding: 4px 16px;

function SidebarItem({ item, depth = 0, currentPage, onNavigate }) {
  const [expanded, setExpanded] = useState(true)
  const hasChildren = item.children && item.children.length > 0
  const isPage = !!PAGES[item.id]
  const isActive = currentPage === item.id

  return (
    <div className="sidebar-item-group">
      <div
        className={`sidebar-item ${isActive ? 'active' : ''} ${isPage ? 'clickable' : ''}`}
        style={{ paddingLeft: `${12 + depth * 16}px` }}
        onClick={() => {
          if (hasChildren) setExpanded(!expanded)
          if (isPage) onNavigate(item.id)
        }}
      >
        {hasChildren && (
          <span className={`sidebar-chevron ${expanded ? 'expanded' : ''}`}>›</span>
        )}
        {!hasChildren && <span className="sidebar-chevron-spacer" />}
        <span className="sidebar-icon">{item.icon}</span>
        <span className="sidebar-label">{item.label}</span>
      </div>
      {hasChildren && expanded && (
        <div className="sidebar-children">
          {item.children.map(child => (
            <SidebarItem
              key={child.id}
              item={child}
              depth={depth + 1}
              currentPage={currentPage}
              onNavigate={onNavigate}
            />
          ))}
        </div>
      )}
    </div>
  )
}
